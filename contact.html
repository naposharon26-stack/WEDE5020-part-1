<!-- TITLE -->
<h2 style="text-align:center; color:#4b2e2e; margin-top:20px;">Order / Contact Us</h2>

<!-- FORM BOX -->
<div style="
    background-color:white;
    max-width:500px;
    margin:20px auto;
    padding:20px;
    border:2px solid #d2691e;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
">

    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name" required style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Email Address:</label><br>
        <input type="email" placeholder="Enter your email" required style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Product:</label><br>
        <input type="text" placeholder="What would you like to order?" required style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Quantity:</label><br>
        <input type="number" placeholder="Enter quantity" required style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Collection Date:</label><br>
        <input type="date" required style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Special Requests:</label><br>
        <textarea placeholder="Write your message here..." style="width:100%; padding:8px; margin-bottom:10px;"></textarea><br>

        <button type="submit" style="
            width:100%;
            background-color:#d2691e;
            color:white;
            padding:10px;
            border:none;
            cursor:pointer;
            font-size:16px;
        ">
            Place Order
        </button>

    </form>

</div>
